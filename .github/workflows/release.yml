name: release

# Builds a relocatable, self-contained `reachify` tooling tarball per OS/arch
# and attaches them all to one GitHub Release. The plugin's session-start hook
# downloads the tarball matching the host (see scripts/reachify-install.sh).
#
# Trigger by pushing a version tag:  git tag v0.0.1 && git push origin v0.0.1
# Manual runs (workflow_dispatch) build the artifacts without publishing.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14         # Apple Silicon  -> darwin-arm64
          - os: macos-13         # Intel          -> darwin-x64
          - os: ubuntu-22.04     # Linux x86_64   -> linux-x64
          - os: ubuntu-22.04-arm # Linux arm64    -> linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # uv fetches the standalone CPython and resolves deps.
      - uses: astral-sh/setup-uv@v5

      - name: Build tarball
        run: bash scripts/build-tarball.sh

      - uses: actions/upload-artifact@v4
        with:
          name: tarball-${{ matrix.os }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
